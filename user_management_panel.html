<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeTunnel - 用户管理中心</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        button.delete {
            background-color: #e74c3c;
        }
        button.delete:hover {
            background-color: #c0392b;
        }
        button.renew {
            background-color: #2ecc71;
        }
        button.renew:hover {
            background-color: #27ae60;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .status-active {
            color: #27ae60;
            font-weight: bold;
        }
        .status-expired {
            color: #e74c3c;
            font-weight: bold;
        }
        .notification {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            display: none;
        }
        .notification.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .notification.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .actions {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EdgeTunnel - 用户管理中心</h1>
        
        <div id="notification" class="notification"></div>
        
        <div class="form-group">
            <label for="userId">用户ID (留空则自动生成):</label>
            <input type="text" id="userId" placeholder="例如: student001">
        </div>
        
        <div class="form-group">
            <label for="days">使用天数:</label>
            <input type="number" id="days" value="30" min="1">
        </div>
        
        <button onclick="createUser()">创建用户</button>
        <button onclick="loadUsers()">刷新用户列表</button>
        
        <h2>用户列表</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>用户ID</th>
                    <th>创建时间</th>
                    <th>到期时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <!-- 用户列表将在这里动态加载 -->
            </tbody>
        </table>
    </div>

    <script>
        // API基础URL - 请根据实际情况修改
        const API_BASE = window.location.origin;
        
        // 显示通知
        function showNotification(message, isSuccess) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + (isSuccess ? 'success' : 'error');
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }
        
        // 创建用户
        async function createUser() {
            const userId = document.getElementById('userId').value.trim();
            const days = parseInt(document.getElementById('days').value);
            
            if (isNaN(days) || days <= 0) {
                showNotification('请输入有效的使用天数', false);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userId: userId || undefined,
                        days: days
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('用户创建成功', true);
                    document.getElementById('userId').value = '';
                    document.getElementById('days').value = '30';
                    loadUsers(); // 刷新用户列表
                } else {
                    showNotification('创建用户失败: ' + result.error, false);
                }
            } catch (error) {
                showNotification('网络错误: ' + error.message, false);
            }
        }
        
        // 删除用户
        async function deleteUser(userId) {
            if (!confirm(`确定要删除用户 ${userId} 吗？此操作不可逆。`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userId: userId
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('用户删除成功', true);
                    loadUsers(); // 刷新用户列表
                } else {
                    showNotification('删除用户失败: ' + result.error, false);
                }
            } catch (error) {
                showNotification('网络错误: ' + error.message, false);
            }
        }
        
        // 续期用户
        async function renewUser(userId) {
            const days = parseInt(prompt(`请输入续期天数 (当前用户: ${userId}):`, '30'));
            
            if (isNaN(days) || days <= 0) {
                showNotification('请输入有效的续期天数', false);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userId: userId,
                        days: days
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification('用户续期成功', true);
                    loadUsers(); // 刷新用户列表
                } else {
                    showNotification('用户续期失败: ' + result.error, false);
                }
            } catch (error) {
                showNotification('网络错误: ' + error.message, false);
            }
        }
        
        // 加载用户列表
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/users/list`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    displayUsers(result.users);
                } else {
                    showNotification('加载用户列表失败: ' + result.error, false);
                }
            } catch (error) {
                showNotification('网络错误: ' + error.message, false);
            }
        }
        
        // 显示用户列表
        function displayUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';
            
            if (!users || users.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="5" style="text-align: center;">暂无用户数据</td>';
                tbody.appendChild(row);
                return;
            }
            
            users.forEach(user => {
                const now = new Date();
                const expiryDate = new Date(user.expiration);
                const isActive = user.expiration ? expiryDate > now : true;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${formatDate(new Date(user.created))}</td>
                    <td>${user.expiration ? formatDate(expiryDate) : '永久'}</td>
                    <td><span class="status-${isActive ? 'active' : 'expired'}">${isActive ? '活跃' : '已过期'}</span></td>
                    <td>
                        <div class="actions">
                            <button class="renew" onclick="renewUser('${user.id}')">续期</button>
                            <button class="delete" onclick="deleteUser('${user.id}')">删除</button>
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
        }
        
        // 格式化日期
        function formatDate(date) {
            if (!(date instanceof Date) || isNaN(date)) {
                return '无效日期';
            }
            return date.toLocaleString('zh-CN');
        }
        
        // 页面加载完成后自动加载用户列表
        window.onload = function() {
            loadUsers();
        };
    </script>
</body>
</html>
